<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Oncall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="index.html" class="logo">On<span>call</span></a>
            <nav class="sidebar-nav">
                <a href="dashboard-customer.html" class="nav-item"><i class="fa-solid fa-house"></i> <span>My Requests</span></a>
                <a href="customer-messages.html" class="nav-item"><i class="fa-solid fa-message"></i> <span>Messages</span></a>
                <a href="customer-history.html" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> <span>History</span></a>
                <a href="customer-profile.html" class="nav-item active"><i class="fa-solid fa-user"></i> <span>Profile</span></a>
            </nav>
            <a href="login.html" class="nav-item" style="margin-top: auto;"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></a>
        </aside>

        <main class="main-content">
            <header class="dash-header">
                <div class="header-info">
                    <h1>Account Settings</h1>
                    <p>Update your personal details and location.</p>
                </div>
                <div class="user-profile">
                    <div class="avatar-sm">SA</div>
                </div>
            </header>

            <div class="card-section">
                <h3>Personal Information</h3>
                <div class="stats-grid" style="grid-template-columns: 1fr 1fr; margin-top: 24px;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" value="Sarah Adams">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" value="082 123 4567">
                    </div>
                </div>
                <div class="form-group">
                    <label>Default Address</label>
                    <input type="text" value="123 Jan Smuts Ave, Rosebank, Johannesburg">
                </div>
                <button class="btn btn-primary">Save Changes</button>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
