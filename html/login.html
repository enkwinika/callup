<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Oncall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card fade-up">
            <div class="auth-header">
                <a href="index.html" class="logo" style="display: block; margin-bottom: 24px;">On<span>call</span></a>
                <h2>Welcome Back</h2>
                <p>Login to manage your services or requests.</p>
            </div>

            <div class="auth-tabs" id="login-tabs">
                <button class="auth-tab active" data-role="user">Customer / Pro</button>
                <button class="auth-tab" data-role="admin">Administrator</button>
            </div>

            <div class="social-auth">
                <button class="btn-social">
                    <i class="fa-brands fa-google" style="color: #EA4335;"></i> Google
                </button>
                <button class="btn-social">
                    <i class="fa-brands fa-apple"></i> Apple
                </button>
            </div>

            <div class="divider"><span>Or login with email</span></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <label style="margin-bottom: 0;">Password</label>
                        <a href="#" style="font-size: 0.85rem; color: var(--primary); text-decoration: none;">Forgot?</a>
                    </div>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div class="divider"><span>Or Quick Simulation</span></div>
            <div style="display: grid; gap: 10px;">
                <button class="btn btn-outline btn-block sim-login" data-target="dashboard-customer.html" style="font-size: 0.9rem; padding: 10px;">Login as Customer</button>
                <button class="btn btn-outline btn-block sim-login" data-target="dashboard-provider.html" style="font-size: 0.9rem; padding: 10px;">Login as Provider</button>
                <button class="btn btn-outline btn-block sim-login" data-target="dashboard-admin.html" style="font-size: 0.9rem; border-color: #1E293B; color: #1E293B; padding: 10px;">Login as Admin</button>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up for free</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
